name: test

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare local venv and config
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest
          cp config/serper.env.example config/serper.env

      - name: Verify required files exist
        run: |
          test -f SKILL.md
          test -f README.md
          test -f scripts/search.py
          test -f scripts/check.sh
          test -f scripts/install.sh

      - name: Check Python syntax
        run: |
          .venv/bin/python -m py_compile scripts/*.py

      - name: Run lightweight tests
        run: |
          .venv/bin/pytest -q tests/test_args.py tests/test_workflows.py

      - name: Run lightweight skill check
        run: |
          RUN_SMOKE=0 bash scripts/check.sh
